name: Build & Test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./... -v -count=1 -short

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd agents
          pip install -e ".[dev]"

      - name: Test
        run: |
          cd agents
          python -m pytest tests/ -v

  build-release:
    name: Build release archives
    runs-on: ubuntu-latest
    needs: [test-go, test-python]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"
          mkdir -p dist/bin
          go build -ldflags "${LDFLAGS}" -o dist/bin/caof-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/caof

      - name: Package release archive
        run: |
          # Copy everything needed into dist/
          cp -r config dist/
          cp -r mcp dist/
          cp -r scripts dist/
          cp -r systemd dist/
          chmod +x dist/scripts/setup.sh dist/scripts/install-mcp-service.sh

          # Create zip
          ARCHIVE="caof-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
          cd dist && zip -r "../${ARCHIVE}" . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caof-${{ matrix.goos }}-${{ matrix.goarch }}
          path: caof-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect zips
        run: |
          mkdir -p release
          find artifacts -name '*.zip' -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.zip

  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --strict
