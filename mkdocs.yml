site_name: CAOF Documentation
site_description: Collective Agentic Orchestration Framework — multi-agent system for persistent, modular R&D workflows
site_url: https://danielckv.github.io/agentic-orchestration/
repo_url: https://github.com/danielckv/agentic-orchestration
repo_name: danielckv/agentic-orchestration
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Architecture:
      - Overview: architecture/overview.md
      - Event Bus: architecture/event-bus.md
      - Memory System: architecture/memory.md
  - Components:
      - Control Plane: components/control-plane.md
      - Agent System: components/agents.md
      - Inference Providers: components/inference.md
      - Research & Export: components/research-export.md
  - Operations:
      - Monitoring: operations/monitoring.md
      - Human-in-the-Loop: operations/hitl.md
  - Reference:
      - Configuration: reference/configuration.md
      - API Reference: reference/api.md
